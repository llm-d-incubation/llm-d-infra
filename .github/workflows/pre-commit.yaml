name: Pre-commit

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    env:
      GO111MODULE: on
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v5
        id: python
        with:
          python-version: 3.13

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v5
        id: go
        with:
          go-version: ^1

      - name: Restore pre-commit cache
        id: cache-restore
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: |
            ~/.cache/pre-commit
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-py${{ steps.python.outputs.python-version }}-go${{ steps.go.outputs.go-version }}-${{ hashFiles('**/.pre-commit-config.yaml') }}

      - run: python -m pip install pre-commit
        shell: bash
      - run: python -m pip freeze --local
        shell: bash

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # renovate: tag=v4.3.1
        with:
          version: v3.10.0

      - name: Helm add bitnami chart
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          helm dependency build charts/llm-d-infra

      - name: Setup helm-docs
        run: |
          (cd /tmp && curl -L https://github.com/norwoodj/helm-docs/releases/download/v1.14.2/helm-docs_1.14.2_Linux_x86_64.tar.gz | tar xz && sudo mv helm-docs /usr/local/bin/)
          helm-docs --version

      - name: Run pre-commit
        run: pre-commit run --show-diff-on-failure --color=always --verbose --all-files --show-diff-on-failure
        shell: bash
